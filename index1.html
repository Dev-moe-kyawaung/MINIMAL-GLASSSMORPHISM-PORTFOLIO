<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moe Kyaw Aung | Minimal Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
        }
        .glass-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .glass-card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 32px 64px rgba(0,0,0,0.2);
            border-color: rgba(255,255,255,0.4);
        }
        .navbar {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .hero h1 {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 700;
            background: rgba(255,255,255,0.9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .skill-item {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease;
        }
        .skill-item.animate {
            opacity: 1;
            transform: translateY(0);
        }
        .progress-fill {
            height: 4px;
            background: rgba(255,255,255,0.9);
            border-radius: 2px;
            transition: width 2s ease;
            box-shadow: 0 2px 8px rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <!-- Ultra-minimal navbar -->
    <nav class="navbar navbar-expand-lg fixed-top py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4 text-white" href="#">Moe Kyaw Aung</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link text-white mx-3 fw-medium" href="#home">Home</a>
                <a class="nav-link text-white mx-3 fw-medium" href="#about">About</a>
                <a class="nav-link text-white mx-3 fw-medium" href="#projects">Work</a>
                <a class="nav-link text-white mx-3 fw-medium" href="#contact">Contact</a>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section id="home" class="hero pt-5">
        <div class="container">
            <div class="row align-items-center min-vh-100">
                <div class="col-lg-6">
                    <h1 class="mb-6">Moe Kyaw Aung</h1>
                    <h2 class="h1 fw-light mb-6 opacity-80 fs-3">Android Developer<br><small class="opacity-75">Tachileik, Myanmar</small></h2>
                    <div class="d-flex gap-3">
                        <a href="#projects" class="btn btn-light px-5 py-3 rounded-pill fw-medium">Projects</a>
                        <a href="mailto:moekyawaung@engineer.com" class="btn btn-outline-light px-5 py-3 rounded-pill fw-medium">Email</a>
                    </div>
                </div>
                <div class="col-lg-6 text-center">
                    <div class="glass glass-card p-5" style="max-width: 320px; margin: 0 auto;">
                        <div class="w-24 h-24 bg-white/20 rounded-full mx-auto mb-4"></div>
                        <h4 class="text-white mb-2">Android Developer</h4>
                        <p class="text-white/70 mb-0">Microsoft | Freelance</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Skills -->
    <section id="about" class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8 text-center mb-5">
                    <h2 class="display-4 fw-light text-white mb-3">Skills</h2>
                    <p class="lead text-white/80">Specialized in modern Android development</p>
                </div>
                <div class="col-lg-10">
                    <div class="row g-4">
                        <div class="col-md-6 skill-item">
                            <div class="glass glass-card p-4">
                                <div class="d-flex justify-content-between mb-3">
                                    <span class="fw-medium text-white">Kotlin</span>
                                    <span class="text-white/70">95%</span>
                                </div>
                                <div class="progress-fill" style="width: 0%" data-width="95%"></div>
                            </div>
                        </div>
                        <!-- More skills -->
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Smooth animations
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('animate');
                    const progressBars = entry.target.querySelectorAll('.progress-fill');
                    progressBars.forEach(bar => {
                        bar.style.width = bar.dataset.width;
                    });
                }
            });
        });
        
        document.querySelectorAll('.skill-item').forEach(item => observer.observe(item));
    </script>
</body>
</html>
